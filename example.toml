[audit]
audit_file = "/tmp/claude-tool-use.json"
audit_level = "matched"
passthrough_log_file = "/tmp/claude-passthrough.json"

[limits]
# Deny Bash commands with more than this many chained sub-commands.
# Set to 0 to disable (default). Recommended: 5
max_chain_length = 5

[git_protection]
# Branches that are considered "protected". Agents are restricted from directly
# committing/pushing to these; they prepare changes for human approval instead.
protected_branches = ["main", "master"]
protected_refs = ["refs/heads/main", "refs/heads/master"]

# --- Reusable variables (referenced as ${VAR_NAME} in regex fields) ---

[variables]
# --- Safe command groups (harmless utilities only, NO runtimes) ---
# Text processing (read/transform stdin or files, no side effects)
# awk is intentionally excluded -- denied entirely (steered to git ls-files + Read, piped grep/rg, or _temp.py).
TEXT_CMDS = "cat|colordiff|comm|cut|diff|head|od|sed|seq|shuf|sort|tac|tail|tee|tr|uniq|wc|xargs"
# Search and query (find content within text or structured data)
# Note: bare `grep`/`rg` leaves match the dedicated `^(grep|rg)\b` allow rule
# (which has no ${NO_CMD_SUB} exclude) BEFORE the ${SAFE_CMDS} catch-all, so the
# grep/rg members here are reachable via SAFE_CMDS only through the absolute-path
# allow. If you add an exclude to the dedicated rule, mirror it for grep/rg here.
SEARCH_CMDS = "grep|jq|rg"
# Formatting and layout (presentation of text)
FORMAT_CMDS = "column|expand|fmt|fold|nl|paste|unexpand"
# File-content inspection utilities (read-only)
# pdfinfo/pdftotext are poppler readonly tools; pdfinfo reports page count
# and metadata. If a binary is not installed the command fails loudly with
# "command not found", which is correct feedback -- the hook gates permission,
# not install state.
INSPECT_CMDS = "file|mediainfo|pdfinfo|pdftotext"
# Checksums and hashes (read-only)
CHECKSUM_CMDS = "md5|md5sum|shasum|sha256sum"
# Filesystem navigation and inspection
FS_CMDS = "basename|cd|chmod|cp|dirname|du|df|ln|ls|lsof|mkdir|mktemp|open|readlink|realpath|stat|tar|touch|tree|type|unlink|unzip|which"
# Process info and management
# wait is a Bash builtin used for dev-server lifecycle (`wait $DEVPID`); included
# here so a bare `wait` leaf is auto-allowed. kill, pkill, and killall are NOT
# included (too powerful: signal arbitrary PIDs/process names, including user
# shells) -- they are denied and steered toward graceful self-exit + pgrep below.
PROC_CMDS = "pgrep|ps|sleep|timeout|wait"
# System info and shell builtins
SYS_CMDS = "curl|date|echo|env|export|expr|false|id|nproc|numfmt|printenv|printf|pwd|screencapture|source|test|true|tty|uname|whoami|xcrun|xxd"
# Build and lint tools (read-only or local-build only, no installs)
DEV_CMDS = "bandit|make|pyflakes"
# Merged safe commands -- harmless utilities only, NO runtimes
SAFE_CMDS = "${TEXT_CMDS}|${SEARCH_CMDS}|${FORMAT_CMDS}|${INSPECT_CMDS}|${CHECKSUM_CMDS}|${FS_CMDS}|${PROC_CMDS}|${SYS_CMDS}|${DEV_CMDS}"
# Tools that can write/read freely as long as every path stays under /tmp.
# Used by the "tmp-scoped" allow rule below. Add new tools here.
TMP_SCOPED_CMDS = "ffmpeg|sox|convert|magick|mogrify|gm|optipng|pngcrush|jpegoptim|cwebp|tesseract|qpdf|pdftk|gs|lame|flac|pandoc|soffice|pdftoppm"
# Absolute-path roots that disqualify a tmp-scoped invocation.
# Excludes /tmp and /private/tmp by construction (they are not in this list).
NON_TMP_ROOTS = "Users|home|usr|etc|opt|var|bin|sbin|root|sys|proc|dev|Library|System|Applications|boot|mnt|media|nsh"

# Local build-output directory prefixes for running freshly-built first-party
# binaries from the current working directory. SwiftPM emits under .build/;
# Cargo emits under target/debug/ and target/release/. Used by the built-binary
# allow rule below (CWD-relative only; absolute paths and `..` stay out).
BUILD_OUT = "\\.build/|target/(?:debug|release)/"

# --- Local runtimes (can execute code, constrained allow patterns only) ---
# npx: only whitelisted packages auto-allowed; unknown packages passthrough to user prompt.
LOCAL_RUNTIMES = "node|deno"

# --- Git invocation patterns ---
# Match various forms of git invocation (direct, with flags, env vars, absolute paths)
GIT_INVOCATION = "(?:^|\\s)(?:command\\s+)?(?:[A-Za-z0-9_]+=\\S+\\s+)*(?:/[^\\s]+/)?git(?:\\s+|$)(?:-(?:C|c)\\s+\\S+\\s+|--git-dir(?:=|\\s+)\\S+\\s+|--work-tree(?:=|\\s+)\\S+\\s+)*"

# --- Generic tool-prefix patterns (apply to non-git tool steers) ---
# Optional prefix: bare command, "command <cmd>", or "env <cmd>".
# PATH=/x and FOO=bar assignments are stripped structurally by the decomposer.
# Caveat: "env FOO=bar <cmd>" is NOT covered (the assignment falls between
# 'env' and the tool name); see docs/CHANGELOG.md.
TOOL_PREFIX = "(?:command\\s+|env\\s+)?"
# Optional absolute-path prefix for the tool name itself.
# Matches /usr/bin/, /opt/homebrew/bin/, /bin/, etc. Tightly bounded
# to avoid matching whitespace-adjacent junk or odd shapes.
TOOL_PATH = "(?:/(?:[^/\\s]+/)*)?"

# --- Security patterns ---
# Block command substitution (backtick and $(...)) to prevent injection
NO_CMD_SUB = "`|\\$\\("
# Block only backtick substitution. Used by allow rules for non-mutating
# stdout/proc commands (echo, printf, ps, pgrep) where `$(...)` is safe:
# the decomposer extracts every `$(...)` inner command as its own leaf and
# evaluates it independently against deny/allow rules (deny wins), so a
# dangerous inner like `$(rm -rf /)` is still blocked. Backticks are NOT
# extracted by the decomposer, so they stay blocked here.
NO_BACKTICK = "`"
# Path traversal exclusion (blocks .. in paths)
NO_TRAVERSAL = "\\.\\."

# --- Approved filesystem zones ---
# Read access: user LaunchAgents and Logs (debugging launchd jobs)
LIBRARY_READ_PATH = "^$HOME/Library/(LaunchAgents|Logs)/"
# Read access: project workspace and top-level dotdirs only (not all of $HOME).
# Customize "projects" to match your workspace folder name.
# Matches: ~/projects, ~/projects/..., ~/.config/..., ~/.claude/..., etc.
HOME_PATH = "^$HOME/(projects(/|$)|\\.[^/]+(/|$))"
# Write access: project workspace (matches ~/projects and ~/projects/...).
# Customize "projects" to match your workspace folder name.
PROJECT_PATH = "^$HOME/projects(/|$)"
# Write access: Claude internal config
CLAUDE_PATH = "^$HOME/\\.claude/"

# --- find safe-zone configuration ---
# Workspace folder name under $HOME. Customize per user.
# example.toml uses "projects" as a placeholder; live configs
# replace it with the user's workspace folder (e.g. "nsh").
# IMPORTANT: WORKSPACE_ROOT only parameterizes the `find` safe
# zone. The file-tool path variables HOME_PATH and PROJECT_PATH
# above hard-code their workspace folder independently; update
# all three together when customizing per user.
WORKSPACE_ROOT = "projects"

# Safe positional path argument for `find`. Branches (in regex order):
#   1. "." or "./..." cwd-rooted relative paths
#   2. "~/${WORKSPACE_ROOT}/..." workspace via tilde (bare ~ and
#      ~/Downloads style paths are NOT allowed)
#   3. /tmp, /tmp/..., and /private/tmp/... scratch paths
#   4. /Users/<user>/${WORKSPACE_ROOT}/... workspace absolute paths
#   5. $HOME/${WORKSPACE_ROOT}/... workspace via $HOME -- spelled
#      [$]HOME so the config's env-var expander (src/config.rs
#      expand_env_vars) does not substitute $HOME at load time
#   6. Claude agent-config subtrees (narrow allowlist):
#      (~|/Users/<user>|[$]HOME)/.claude/(agents|commands|skills)/...
#      The [$]HOME spelling matches branch 5: the env-var expander
#      treats bare $HOME as a substitution target, so the char-class
#      form is required. Broad ~/.claude is denied by D2c.
#   7. bare relative paths (letters/digits/dots/dashes; first char
#      a letter or underscore; no leading /, ~, $, .., or *)
# Does NOT match:
#   - bare ~ (would scan entire home)
#   - bare /, system roots, bare /Users, bare /home, bare /Users/<user>
#   - non-workspace /Users/<user>/<subdir>/... paths
#   - bare ~/.claude, ~/.config, /var/folders (denied by D2c)
#   - any path containing shell glob chars (*, ?, [) in any segment
# Note: `..` path traversal is excluded by D5 deny and by A1's
# command_exclude_regex (${NO_TRAVERSAL}), not by this pattern.
# Segment char class includes `()'"\` so quoted or escaped path segments
# (e.g. SolidJS route dirs named `(0)concepts`, written `'(0)concepts'` or
# `\(0\)concepts`) match. `..` traversal is still excluded by D5 / A1.
FIND_SAFE_PATH_ARG = "(?:\\.(?:/[A-Za-z0-9_./()'\"\\\\-]+)?|~/${WORKSPACE_ROOT}(?:/[A-Za-z0-9_./()'\"\\\\-]+)?|/(?:private/)?tmp(?:/[A-Za-z0-9_./()'\"\\\\-]+)?|/Users/[^/\\s]+/${WORKSPACE_ROOT}(?:/[A-Za-z0-9_./()'\"\\\\-]+)?|[$]HOME/${WORKSPACE_ROOT}(?:/[A-Za-z0-9_./()'\"\\\\-]+)?|(?:~|/Users/[^/\\s]+|[$]HOME)/\\.claude/(?:agents|commands|skills|plugins|plans|projects)(?:/[A-Za-z0-9_./()'\"\\\\-]+)?|[A-Za-z_][A-Za-z0-9_-]*(?:/[A-Za-z0-9_./()'\"\\\\-]+)?)"

# Absolute safe-zone roots: workspace (tilde, /Users, $HOME), /tmp, and the
# narrow ~/.claude agent-config subtrees. These mirror the ABSOLUTE branches of
# FIND_SAFE_PATH_ARG (no bare-relative branch -- a relative path never triggers
# the grep/rg absolute-path deny, so the exclude only needs the absolute zones).
# Used by the grep/rg absolute-path deny exclude below.
SAFE_ABS_ZONES = "/(?:private/)?tmp|~/${WORKSPACE_ROOT}|/Users/[^/\\s]+/${WORKSPACE_ROOT}|[$]HOME/${WORKSPACE_ROOT}|(?:~|/Users/[^/\\s]+|[$]HOME)/\\.claude/(?:agents|commands|skills|plugins|plans|projects)"

# ===================================================================
# DENY rules (checked first, before allow rules)
# Every deny rule MUST have a reason field to steer Claude to a better path.
# ===================================================================

# --- Destructive file operations ---

# Hard-deny rm against system directories, $HOME/~/root by themselves, or
# bare wildcards. These fire even when other rm allow rules would match.
[[deny]]
tool = "Bash"
command_regex = "\\brm\\s+(-[a-zA-Z]+\\s+)*(/(etc|usr|opt|System|Library|var|bin|sbin|Volumes|private|boot|dev|proc|sys|root|lib)(/|\\s|$)|/\\s*$|~\\s*$|\\$HOME(\\s|/?$)|\\*(\\s|$))"
reason = "Use a specific path under ~/nsh/ or /tmp/. rm against system directories, /, ~, $HOME, or bare * is rejected to prevent accidental deletion."

# Hard-deny rm with .. traversal. Always blocks even if other allow rules match.
[[deny]]
tool = "Bash"
command_regex = "\\brm\\b[^|;&]*\\.\\.(/|\\s|$)"
reason = "Use an explicit path inside the working tree. rm with `..` traversal is rejected because it escapes the intended directory."

# Deny rm (with exceptions for safe patterns). The exclude carves out paths
# under ~/nsh/ (matching the Write/Edit zone), /tmp/, caches, _prefix scratch
# files, git rm, and bare relative paths starting with a letter. Hard-deny
# rules above still block dangerous shapes regardless of this exclude.
[[deny]]
tool = "Bash"
command_regex = "\\brm\\b"
command_exclude_regex = "\\bgit\\s+rm\\b|\\brm\\s+(-[a-zA-Z]+\\s+)*/tmp/|\\brm\\s+(-[a-zA-Z]+\\s+)*\\S*[Cc]ache|\\brm\\s+(-[a-zA-Z]+\\s+)*(\\S*/)?_\\S+|\\brm\\s+(-[a-zA-Z]+\\s+)*(/Users/[^/\\s]+/nsh/|~/nsh/)\\S+|\\brm\\s+(-[a-zA-Z]+\\s+)*[A-Za-z][A-Za-z0-9_./-]*"
reason = "Use a path under ~/nsh/, prefix the file with `_`, or move it to /tmp/ first. rm outside ~/nsh/, /tmp/, caches, _prefix scratch files, and bare relative paths is rejected to prevent accidental deletion."

# Deny sensitive file reads (.env, .secret contain credentials)
[[deny]]
tool = "Read"
file_path_regex = "\\.(env|secret)$"
reason = "Ask the user to provide the specific values you need. Reading .env or .secret files is rejected because they contain credentials."

# Deny bare mv (use git mv for tracked files)
[[deny]]
tool = "Bash"
command_regex = "^mv\\b"
reason = "Use `git mv old.py new.py` for tracked files. For untracked files, use `cp` + `rm` or ask the user. Bare `mv` is rejected to preserve git history."

# Deny destructive podman operations (force removal, prune, kill, force stop)
[[deny]]
tool = "Bash"
command_regex = "^podman\\s+(rm\\s+-f|rmi\\s+-f|kill|stop\\s+-t\\s*0|system\\s+prune|volume\\s+(rm|prune)|network\\s+(rm|prune)|image\\s+(rm|prune))\\b"
reason = "Ask the user to run destructive podman operations manually (force removal, prune, kill, force stop). These are rejected to prevent unrecoverable container or volume loss."

# --- Destructive git operations ---

# git commit is now branch-aware: see "Deny local mutations on protected branches" below.

# Deny git stash
[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}stash\\b"
reason = "Use `git diff` and `git diff --staged` to inspect changes without hiding them. To set work aside, commit it on an `agent/<task>` branch (a worktree works well). `git stash` is rejected because it hides work and can lose it."

# Deny git clean (destructive, removes untracked files)
[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}clean\\b"
reason = "Use targeted `rm` against specific files, or ask the user to clean up manually. `git clean` is rejected because it destroys untracked files in one shot."

# Deny git tag (every form, including read-only `git tag --list`). Tags are
# unused in this workflow; the regex anchors on the `tag` subcommand so listing
# is not carved out. Mirrors the git allow's invocation-prefix handling.
[[deny]]
tool = "Bash"
command_regex = "^git\\s+((-C\\s+\\S+|-c\\s+\\S+|--no-pager)\\s+)*tag\\b"
reason = "Ask the user to list or create tags."

# Deny git init (every form). Repository bootstrap belongs in a dedicated setup
# script, not in agent runs.
[[deny]]
tool = "Bash"
command_regex = "^git\\s+((-C\\s+\\S+|-c\\s+\\S+|--no-pager)\\s+)*init\\b"
reason = "Run repository bootstrap from a dedicated setup script."

# Deny wholesale-discard forms of git restore.
# Matches `git restore .`, `git restore :/`, `git restore --staged --worktree .`,
# `git restore --source=HEAD .`, etc. The `.` / `:/` pathspec selects every
# tracked file and unstages all renames, silently destroying uncommitted agent
# work. Single-file forms (`git restore path/to/file.py`) remain allowed by
# the git allowlist.
[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}restore\\b[^|;&]*\\s(?:\\.|:/)(?:\\s|$)"
reason = "Use `git restore path/to/file` to discard a single file. Use `git diff` and `git diff --staged` to inspect changes. Ask the user to wipe everything if that is really what you want. `git restore .` or `:/` is rejected because it discards every tracked change and unstages renames, destroying uncommitted work."

# Deny wholesale-discard forms of git checkout.
# Matches `git checkout .`, `git checkout -- .`, `git checkout HEAD -- .`,
# `git checkout <ref> -- .`, and `git checkout :/`. Same blast radius as
# `git restore .` -- destroys uncommitted agent work. Branch switches
# (`git checkout main`, `git checkout -b feature`) and single-file forms
# (`git checkout -- one_file.py`) remain allowed.
[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}checkout\\b[^|;&]*\\s(?:\\.|:/)(?:\\s|$)"
reason = "Use `git checkout -- path/to/file` to discard a single file. Use `git diff` and `git diff --staged` to inspect changes. Ask the user to wipe everything if that is really what you want. `git checkout .` or `:/` is rejected because it discards every tracked change and unstages renames, destroying uncommitted work."

# git reset --hard is now branch-aware: see "Deny reset --hard on protected branches" below.

# Deny all force pushes (--force, -f, --force-with-lease) -- destroys remote history.
# Any force push requires explicit user approval; ask the user to push manually.
[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}push\\b.*(-f\\b|--force\\b|--force-with-lease\\b)"
reason = "Ask the user to run the force push manually so they can verify the target branch. Force push is rejected from agents because it destroys remote history."

# Deny ALL git push from agents on every branch and every form.
# Passthrough audit (2026-05-15) showed `git push origin agent/<task>`
# reaching user approval each time. User-confirmed rule: agents never
# push; the human pushes after reviewing merged work locally.
[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}push\\b"
reason = "Ask the user to push manually. `git push` is rejected from agents on every branch (not just protected); the human reviews local commits and pushes after approving the merge."

# --- Protected branch enforcement ---
# These rules deny operations that would advance protected branch tips.
# The workflow: agents prepare merges with `git merge --no-commit --no-ff` on protected branches,
# leaving the working tree and index ready for human review and final `git commit` and `git push`.

# Deny push to protected branches (any form: direct, colon notation, +force, deletion, etc.)
[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}push\\b.*\\b${PROTECTED_REFS}\\b"
reason = "Prepare a merge with `git merge --no-commit --no-ff agent/<task>` and let the human review and push. Push to protected branches is rejected; the human pushes after merging and committing."

# Deny local mutations on protected branches: commit
[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}commit\\b"
protected_branch_check = true
reason = "Prepare a merge for human review and final commit:\n\n  git merge --no-commit --no-ff agent/<task>\n  # resolve conflicts, run tests, leave staged\n\nThe user reviews with `git diff HEAD` and runs the final `git commit` and `git push`. Direct commit (or reset --hard) on a protected branch is rejected -- the human owns the final commit."

# Deny reset --hard on protected branches
[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}reset\\s+--hard\\b"
protected_branch_check = true
reason = "Prepare a merge for human review and final commit:\n\n  git merge --no-commit --no-ff agent/<task>\n  # resolve conflicts, run tests, leave staged\n\nThe user reviews with `git diff HEAD` and runs the final `git commit` and `git push`. Direct commit (or reset --hard) on a protected branch is rejected -- the human owns the final commit."

# Deny ref-plumbing against protected refs
[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}(?:update-ref|symbolic-ref)\\b.*\\b${PROTECTED_REFS}\\b"
reason = "Use a feature branch for ref-plumbing operations. `update-ref`/`symbolic-ref` against protected refs is rejected."

# Deny dangerous branch operations on protected names
[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}branch\\s+(?:-f|--force|-D)\\b.*\\b${PROTECTED_BRANCHES}\\b"
reason = "Use a feature branch name as the target. Force-deleting or force-overwriting a protected branch (`branch -f`/`-D`) is rejected."

# Deny any merge on protected branches except the sanctioned prepare-shape
# and --abort. The exclude carves out the legitimate forms; specific denies
# below (-m, protected source, --continue, --ff-only, --squash) still fire
# on their respective shapes via separate rules.
[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}merge\\b"
command_exclude_regex = "\\bmerge\\s+--abort\\b|\\bmerge\\s+(?:--no-commit\\s+--no-ff|--no-ff\\s+--no-commit)\\s+[A-Za-z0-9._/][A-Za-z0-9._/-]*\\s*$"
protected_branch_check = true
reason = "Use `git merge --no-commit --no-ff agent/<task>` to prepare a merge for human review and final commit. Other merge forms on protected branches are rejected."

# Unconditional deny: --continue forms finalize commits after conflict resolution
# and violate the "human makes the commit" rule on every branch.
[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}(?:merge|cherry-pick|revert|rebase)\\s+--continue\\b"
reason = "Use `git <verb> --abort` if the operation went wrong, then resolve and re-prepare on a feature branch. `git <verb> --continue` is rejected because it finalizes a commit after conflict resolution; the human runs the final commit."

[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}merge\\s+(?:--ff-only|--squash)"
protected_branch_check = true
reason = "Use `git merge --no-commit --no-ff agent/<task>` instead. `--ff-only` and `--squash` on protected branches are rejected."

# Allow the safe merge form on protected branches
# Deny merge-prepare with -m / --message: the human writes the merge message.
[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}merge\\s+(?:--no-commit\\s+--no-ff|--no-ff\\s+--no-commit)\\b.*\\s(?:-m|--message)\\b"
protected_branch_check = true
reason = "Stage the merge with `git merge --no-commit --no-ff agent/<task>` and let the human write the commit message. `-m`/`--message` on the merge-prepare command is rejected."

# Deny merge-prepare with a protected source branch (would merge protected into protected).
[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}merge\\s+(?:--no-commit\\s+--no-ff|--no-ff\\s+--no-commit)\\s+${PROTECTED_BRANCHES}\\s*$"
protected_branch_check = true
reason = "Use a non-protected source branch (e.g. `agent/<task>`) as the merge-prepare source. Merging a protected branch into a protected branch is rejected."

# Allow only the narrow merge-prepare form on protected branches:
#   git merge --no-commit --no-ff <non-protected-branch>
# Both flags required (any order). Exactly one branch-like trailing arg.
# No -m / --message. No protected source branch. The human writes the message.
# Allow on any branch. On protected branches the specific denies above (-m,
# protected source) catch misuse. On feature branches there's no restriction
# to begin with.
[[allow]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}merge\\s+(?:--no-commit\\s+--no-ff|--no-ff\\s+--no-commit)\\s+[A-Za-z0-9._/][A-Za-z0-9._/-]*\\s*$"
reason = "Allowed: merge preparation with --no-commit --no-ff. On protected branches the human reviews and commits."

# Allow merge abort unconditionally
[[allow]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}merge\\s+--abort"
reason = "Allowed: merge abort (escape hatch for conflict resolution failures)."

# Deny cherry-pick and revert on protected branches
[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}(?:cherry-pick|revert)\\b"
protected_branch_check = true
reason = "Use a feature branch for cherry-pick or revert, then prepare a merge with `git merge --no-commit --no-ff`. Cherry-pick and revert on protected branches are rejected because they create commits."

# Deny rebase on ALL branches. Rebases rewrite history; humans run them.
# Agents stage work on an agent/<task> branch and let the human rebase or
# prepare a merge. Only `--abort` (the escape hatch) is allowed. Note
# `rebase --continue` is already denied unconditionally above.
[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}rebase\\b"
command_exclude_regex = "\\brebase\\s+--abort\\b"
reason = "Humans run rebases. Stage your work on an `agent/<task>` branch and ask the human to rebase, or prepare a merge with `git merge --no-commit --no-ff agent/<task>`. `git rebase` is rejected on all branches (only `git rebase --abort` is allowed as an escape hatch)."

# --- Privilege escalation ---

# Deny sudo -- no privilege escalation from Claude
[[deny]]
tool = "Bash"
command_regex = "\\bsudo\\b"
reason = "Ask the user to run privileged commands manually. `sudo` is rejected; agents do not escalate to root."

# --- Remote code execution ---

# Deny deno run with http/https URLs
[[deny]]
tool = "Bash"
command_regex = "\\bdeno\\s+run\\s+.*https?://"
reason = "Download the script first with `curl -o local_file.ts <url>`, review it, then run `deno run local_file.ts`. Running remote Deno scripts directly is rejected -- code from a URL is not auditable before execution."

# Deny piping remote content to a runtime -- classic RCE pattern.
# Covers curl/wget/fetch piped into any common interpreter or shell.
[[deny]]
tool = "Bash"
command_regex = "\\b(curl|wget|fetch)\\b[^|]*\\|\\s*${TOOL_PATH}(python3?|bash|sh|zsh|node|ruby|perl)\\b"
reason = "Download to a local file first with `curl -o <file> <url>`, review it, then execute. Piping remote content to a runtime (curl|bash, wget|python, etc.) is rejected -- it is the classic RCE shape."

# --- Process / background management steering ---

# Deny nohup. The harness already provides background execution (the Bash
# tool's run_in_background mode) plus the Monitor tool for streaming output
# and TaskOutput for retrieval. `nohup ... &` orphans a process outside that
# tracking and leads to hand-rolled PID juggling (echo $!, ps/pgrep polling,
# bare until-loops). Steer back to the native mechanism.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}nohup\\b"
reason = "Use the Bash tool's background mode (run_in_background) plus the Monitor tool to manage long-running processes. `nohup ... &` is rejected because it orphans processes outside the harness's tracking; the harness already provides background execution and output capture."

# Deny the absolute /usr/bin/time (and /bin/time) binary. Steer to the bare
# `time` keyword, which the decomposer strips so the inner command is
# evaluated on its own (e.g. `time node app.mjs` -> `node app.mjs`). Absolute
# utility paths are a workaround that bypasses normal leaf evaluation.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}/(?:usr/bin|bin)/time\\b"
reason = "Use the bare `time <cmd>` keyword from PATH (e.g. `time node app.mjs`), not the absolute `/usr/bin/time` binary. The `time` keyword is stripped by the decomposer and the inner command is evaluated normally; absolute utility paths are rejected."

# --- Python environment steering ---

# Deny PYTHONDONTWRITEBYTECODE / PYTHONUNBUFFERED env prefixes.
# source_me.sh already exports these; Claude should use it.
[[deny]]
tool = "Bash"
command_regex = "PYTHONDONTWRITEBYTECODE|PYTHONUNBUFFERED"
reason = "Use `source source_me.sh && python3 ...` -- the shim already exports `PYTHONDONTWRITEBYTECODE` and `PYTHONUNBUFFERED`. Setting them manually is rejected as redundant."

# Deny VAR=$(...) assignments as standalone commands.
[[deny]]
tool = "Bash"
command_regex = "^[A-Za-z_]+=\\$\\("
reason = "Use `source source_me.sh` for environment setup, or inline the command directly. `VAR=$(...)` assignments are rejected because they hide side effects inside an assignment."

# Deny $PYTHON variable - use python3 directly
[[deny]]
tool = "Bash"
command_regex = "\\$PYTHON\\b|\\$\\{PYTHON\\}"
reason = "Use `python3` directly. The `$PYTHON` variable is rejected because the actual interpreter name is clearer."

# Deny bare env-var-only assignment (no command following).
# The exclude carves out the dev-server lifecycle idiom `VAR=$!` (capture last
# background PID), `VAR=$?` (capture last exit code), and `VAR=$$` (current
# PID). These are explicitly allowed by a dedicated rule below.
[[deny]]
tool = "Bash"
command_regex = "^[A-Za-z_]+=[^\\s]+$"
command_exclude_regex = "^[A-Z_][A-Z0-9_]*=\\$[!?$]$"
reason = "Run a command after the assignment (e.g. `FOO=x command ...`), or set the variable inside your script. A bare `VAR=value` leaf with no command is rejected because the decomposer splits it into a useless leaf."

# Deny empty / whitespace-only / literal-"null" Bash commands. The decomposer
# yields a single empty leaf for an empty command string, and `null` is JSON
# null serialized as a string. Either form is a no-op and should not silently
# passthrough -- a steer reminds the agent to provide a real command.
# 2026-05-21 audit: 16 null/whitespace passthrough entries observed.
[[deny]]
tool = "Bash"
command_regex = "^\\s*(null)?\\s*$"
reason = "Provide a real Bash command (e.g. `pwd`, `ls`, `git status`). Empty, whitespace-only, or literal-`null` commands are rejected because they are no-ops."

# Allow `VAR=$!`, `VAR=$?`, `VAR=$$` -- dev-server lifecycle PID/status capture.
# Examples: `DEVPID=$!`, `SERVER_PID=$!`, `STATUS=$?`. Narrow shape:
# SCREAMING_SNAKE name = $ + one of {! ? $} only, end of leaf. Anything broader
# (e.g. `FOO=$BAR`) stays denied by the bare env-var-only deny above. The
# exclude on that deny carves these out so this allow can fire.
[[allow]]
tool = "Bash"
command_regex = "^[A-Z_][A-Z0-9_]*=\\$[!?$]$"

# Deny python -c inline code in every invocation form: bare `python3 -c`,
# `python -c`, version-suffixed `python3.12 -c`, absolute-path binaries
# (/opt/homebrew/bin/python3 -c, /opt/homebrew/opt/python@3.12/.../python3.12 -c),
# and command/env prefixes. ${TOOL_PATH} covers the absolute-path forms;
# the `(-\S+\s+)*` segment allows interpreter flags before -c (e.g.
# `python3 -B -c`). `python3 script.py` is unaffected -- no -c token.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}python3?[^\\s]*\\s+((-X|-W|--check-hash-based-pycs)(=|\\s+)\\S+\\s+|-\\S+\\s+)*-c\\b"
reason = "Write a `_temp.py` file (underscore-prefixed files can be removed freely), then run `source source_me.sh && python3 _temp.py`. `python -c` with inline code is rejected because it is hard to lint and debug."

# --- Shell anti-patterns ---

# Deny heredocs (<<EOF, <<'EOF', <<"EOF", <<-EOF, etc.)
[[deny]]
tool = "Bash"
command_regex = "<<-?\\s*['\"]?\\w+"
reason = "Write code to a `_temp.py` or `_temp.sh` file (underscore-prefixed files can be removed freely) using the Write tool, then run it with `source source_me.sh && python3 _temp.py` or `bash _temp.sh`. Heredocs (`<<EOF`) are rejected because they are hard to read, lint, and test."

# Deny for loops (force .py/.sh files for looping logic).
# The anchor `(^|[|;&]\s*|\bdo\s+)` matches the `for` keyword at start-of-leaf,
# after a pipe/semicolon/&/&&/||, or after a `do ` (a `for` nested inside a
# `do ... done` body).
# 2026-05-29 audit: the old keyword-only `for\b` false-positived on a `|for`
# sequence INSIDE a quoted grep pattern (e.g. `grep -E 'until |for ' file`),
# denying a legitimate file search. The deny now requires real for-loop
# SYNTAX after the keyword: `for NAME in ...` or the C-style `for ((...))`.
# A bare `|for ` inside a search pattern lacks the `NAME in` / `((` tail and
# no longer matches.
[[deny]]
tool = "Bash"
command_regex = "(?s)(^|[|;&]\\s*|\\bdo\\s+)for\\s+(\\w+\\s+in\\b|\\(\\()"
reason = "Write the loop in a `_temp.py` or `_temp.sh` file (underscore-prefixed files can be removed freely), then run `bash _temp.sh` or `source source_me.sh && python3 _temp.py`. Inline `for` loops in the Bash tool are rejected."

# Deny while/until loops -- same anchoring as `for` above. `until` is included
# because until-poll loops (`until [ -f x ]; do sleep; done`) are the
# hand-rolled background-waiting that the Monitor tool / Bash run_in_background
# mode replace. The deny requires real loop SYNTAX: the keyword followed by a
# condition and a `do` keyword, so a bare `|while`/`|until` inside a quoted
# grep pattern (e.g. `grep 'a|while' file`) no longer false-matches.
[[deny]]
tool = "Bash"
command_regex = "(?s)(^|[|;&]\\s*|\\bdo\\s+)(while|until)\\b.*?\\bdo\\b"
reason = "Write the loop in a `_temp.py` or `_temp.sh` file, or use the Monitor tool / Bash run_in_background mode for polling. Inline `while`/`until` loops in the Bash tool are rejected (underscore-prefixed scratch files can be removed freely)."

# Deny redundant bash -c / bash -lc wrappers inside the Bash tool.
# The Bash tool already runs bash, so bash -c "cmd" is bash-in-bash.
[[deny]]
tool = "Bash"
command_regex = "^bash\\s+-[a-zA-Z]*c[a-zA-Z]*\\s+"
reason = "Run the command directly -- the Bash tool already runs bash. `bash -c` / `bash -lc` is rejected as bash-in-bash."

# --- Tool steering (use dedicated Claude tools instead) ---

# --- find: bounded read-only allow in safe path zones ---
# Split policy: D1a hard-deny destructive/output-file predicates,
# D1b conservative-deny advanced predicates, D2a bare/system roots
# + bare `~`, D2b non-workspace home subdirs (absolute + tilde),
# D3 destructive xargs pipelines, D4 bare `find`, D5 path traversal
# + command substitution; A1 allow read-only `find` in safe path
# zones. All find rules anchor at ^${TOOL_PREFIX}${TOOL_PATH}find\b
# so absolute-path invocations (/usr/bin/find, /opt/homebrew/bin/find)
# and `command find` prefixes route through the same rules. See
# docs/CHANGELOG.md 2026-05-17 and the "Why find got a safe-zone
# allow" note in docs/CONFIGURATION_GUIDE.md.

# D1a -- hard deny of destructive / output-file find predicates.
# Fires regardless of path or other flags.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}find\\b.*\\s-(delete|exec|execdir|ok|okdir|fprint|fprintf|fls)\\b"
reason = "Use `find` only for read-only discovery. `find` with `-delete`, `-exec`, `-execdir`, `-ok`, `-okdir`, `-fprint`, `-fprintf`, or `-fls` is denied. First list candidates with `find <safe-root> ...`, review them, then run any mutation as a separate explicit command."

# D1b -- conservative first-pass deny of advanced find predicates.
# These predicates are not absolutely unsafe; they expand the
# policy surface and require fixtures before relaxation. Add a
# focused allow with fixtures if logs show legitimate demand.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}find\\b.*\\s-(printf|print0|prune|newer|mtime|atime|user|group|perm|size|links|inum|samefile|fstype|mount|xdev|regex|iregex)\\b"
reason = "Use simple read-only `find` predicates such as `-name`, `-iname`, `-type`, `-path`, `-not`, `-o`, `-a`, `-maxdepth`, `-mindepth`, or `-print`. Advanced predicates (`-printf`, `-print0`, `-prune`, `-newer`, `-mtime`, `-atime`, `-user`, `-group`, `-perm`, `-size`, `-links`, `-inum`, `-samefile`, `-fstype`, `-mount`, `-xdev`, `-regex`, `-iregex`) are not allowed in the first pass; add a focused rule with fixtures if one is needed."

# D2a -- bare `/`, system roots, bare home roots, bare `~`.
# Flag-before-path forms (`find -L /etc ...`) are consumed by the
# leading flag prefix.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}find\\s+(-[A-Za-z]+(\\s+\\S+)?\\s+)*(/(?:\\s|$)|/(etc|usr|opt|System|Library|var|bin|sbin|root|sys|proc|dev|boot)\\b|/(Users|home)(/[^/\\s]+)?/?(\\s|$)|~(\\s|$))"
reason = "Use a relative path, `/tmp`, `/private/tmp`, or a workspace path under `~/<workspace>/...`. `find` against bare `/`, system roots (`/etc`, `/usr`, `/opt`, `/System`, `/Library`, `/var`, `/bin`, `/sbin`, `/root`, `/sys`, `/proc`, `/dev`, `/boot`), bare home roots (`/Users`, `/Users/`, `/home`, `/home/`, `/Users/<user>`, `/Users/<user>/` without a further subpath), or bare `~` (which would scan the whole home directory) is denied to prevent broad cross-user or system scans."

# D2b -- standard non-workspace home subdirs (absolute /Users/<user>/<subdir>
# and tilde ~/<subdir>). Rust regex has no lookaround, so this enumerates
# the standard macOS home subdirs explicitly. Non-standard non-workspace
# subdirs (e.g. /Users/<me>/scratch_random_dir) fall through to passthrough.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}find\\s+(-[A-Za-z]+(\\s+\\S+)?\\s+)*(/Users/[^/\\s]+|~)/(Downloads|Documents|Desktop|Library|Movies|Music|Pictures|Public|Applications)\\b"
reason = "Use a workspace path under `~/<workspace>/...` for read-only `find`. Scans of standard non-workspace home subdirs (Downloads, Documents, Desktop, Library, Movies, Music, Pictures, Public, Applications) -- whether spelled `/Users/<user>/<subdir>` or `~/<subdir>` -- are denied."

# D2c -- broad user-config / cache trees. Matches the bare or
# trailing-slash form of `~/.claude`, `~/.config`, the absolute
# `/Users/<user>/.claude`, `/Users/<user>/.config` variants, and
# `/var/folders` (system cache). The trailing `(\s|$)` anchor
# means this deny only fires when no further subpath follows, so
# `find ~/.claude/agents ...` does NOT hit D2c (the `/agents`
# token would have to be `\s` or EOS, which it is not).
# A1's narrow allowlist handles `~/.claude/(agents|commands|skills)`.
# Non-allowlist subdirs like `~/.claude/projects` are neither
# matched by A1 nor by D2c -- they passthrough.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}find\\s+(-[A-Za-z]+(\\s+\\S+)?\\s+)*((~|/Users/[^/\\s]+)/\\.(claude|config)|/var/folders)/?(\\s|$)"
reason = "Use a workspace path under `~/<workspace>/...` or a narrow Claude subtree (`~/.claude/agents`, `~/.claude/commands`, `~/.claude/skills`). Broad scans of `~/.claude`, `~/.config`, or `/var/folders` are denied because those trees contain config, cache, and credentials that should not be recursed."

# D3 -- destructive xargs pipelines. Broader than the find-allow strictly
# requires; destructive xargs is independently risky. Matches any leaf
# where `xargs` is followed (with any flags) by `rm`, `chmod`, `chown`,
# `mv`, or `sudo`. The `[^|;&]*` between xargs and the verb accepts
# arbitrary flag shapes (-I{}, -I {}, -0 -I{}, etc.).
[[deny]]
tool = "Bash"
command_regex = "\\bxargs\\b[^|;&]*\\b(rm|chmod|chown|mv|sudo)\\b"
reason = "Destructive `xargs` pipelines (`xargs rm`, `xargs -0 rm`, `xargs -I{} rm`, `xargs chmod`, `xargs chown`, `xargs mv`, `xargs sudo`) are denied. List candidates with `find <safe-root> ...` or `git ls-files <pathspec>`, review, then run the mutation as a separate explicit command on the chosen paths."

# D4 -- bare `find` (no args). Auto-deny rather than passthrough: an
# unbounded recursive listing at cwd is almost never what the agent wants.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}find\\s*$"
reason = "Use `find <safe-root> -name <pattern>` or `find <safe-root> -type f` for read-only discovery. Bare `find` is denied because it performs an unbounded recursive listing with no filter."

# D5 -- find with path traversal or command substitution.
# A1's command_exclude_regex drops these from the allow but no
# other deny catches them, so without this rule they would fall
# through to passthrough. Explicit deny + steering reason is faster
# than the user-approval dialog.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}find\\b.*\\.\\.(/|\\s|$)"
reason = "Use a path inside the working tree without `..` traversal. `find` with path traversal (`..`) is denied because it escapes the intended search scope. (Command substitution in a find leaf is denied separately by the structural cmd-sub guard.)"

# A1 -- allow read-only `find` in safe path zones. Path arg must match
# ${FIND_SAFE_PATH_ARG}; the exclude regex mirrors D1a+D1b predicates
# plus the ${NO_TRAVERSAL} exclusion so unsupported predicates fail
# the allow *and* match a deny (clearer than passthrough). The
# ${NO_TRAVERSAL} entry here is intentional belt-and-suspenders overlap
# with D5: D5 fires first (deny precedence) and provides the steering
# message, this exclude prevents A1 from inadvertently allowing a
# traversal leaf if D5's regex ever misses an edge case. Command
# substitution is no longer excluded here -- the structural cmd-sub guard
# (src/lib.rs is_search_cmd + has_active_cmd_sub) denies a find leaf with
# real (unquoted) `$(...)`/backtick, so quoted substitution characters in
# a path no longer false-deny. The trailing path terminator is `(?:\\s|$)`
# (not `\\b`) because the safe path arg can end in `.`, `/`, or `-`,
# all of which are non-word chars where `\\b` would fail.
[[allow]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}find\\s+(-[A-Za-z]+(\\s+\\S+)?\\s+)*${FIND_SAFE_PATH_ARG}(?:\\s|$)"
command_exclude_regex = "\\s-(delete|exec|execdir|ok|okdir|fprintf|fprint|fls|printf|print0|prune|newer|mtime|atime|user|group|perm|size|links|inum|samefile|fstype|mount|xdev|regex|iregex)\\b|${NO_TRAVERSAL}"

# Deny `git grep`. Pattern: agents who hit the grep deny look for a Bash
# escape hatch and reach for `git grep`, which would keep every search
# shell-side instead of git ls-files + Read; piped grep/rg stays allowed.
# Uses ${GIT_INVOCATION} to match every git invocation form (bare git,
# command git, env-prefixed, absolute path /usr/bin/git, -C/-c/--git-dir
# /--work-tree flags); a narrower regex would leave obvious bypasses.
[[deny]]
tool = "Bash"
command_regex = ".*${GIT_INVOCATION}grep\\b"
reason = "Use `git ls-files <pathspec>` to list candidate files, then use the Read tool on targeted files. `grep` and `rg` remain useful as pipeline filters on already-bounded command output (`git ls-files | grep pat`). For broad or structured content searches write a `_temp.py` helper that starts from a bounded candidate list (e.g. `git ls-files`) and run it with `source source_me.sh && python3 _temp.py`. `git grep` is denied to keep repo content search on the bounded workflow: list candidates first, then inspect targeted files. Scope-control rule, not anti-grep."

# Deny Claude Code tool names typed as Bash commands. Pattern: agents read
# steering messages and literally paste tool names like 'Grep ...' or
# 'Read ...' into Bash instead of invoking the tool. The decomposer already
# splits leaves on |/&&/;, so we only need to anchor at start-of-leaf --
# adding mid-pipeline alternation here would false-positive on grep
# patterns that happen to enumerate tool names (e.g. `grep "Grep\|Read" file`).
[[deny]]
tool = "Bash"
command_regex = "^\\s*(Grep|Read|Glob|Edit|Write|Task|WebFetch|WebSearch)\\b"
reason = "Invoke the actual tool, not its name typed into Bash. `Read` reads a file; `Edit`/`Write` modify files; `Task`/`WebFetch`/`WebSearch` are first-class tool calls. For file search use `git ls-files <pathspec>` plus the Read tool. Typing `Grep`, `Glob`, `Read`, `Edit`, `Write`, `Task`, `WebFetch`, or `WebSearch` into Bash runs whatever (if anything) is on PATH by that name, not the Claude Code tool."

# Deny cat/head/tail when reading files (any path-shaped argument).
# Pipeline leaves like 'head -5' (no file, consuming stdin) are not matched.
# Covers absolute-path invocations (/bin/cat) and command/env prefixes.
# Char class is [^>] (not [^>|]), matching the grep/sed denies: a '|' in a
# leaf is always inside a quoted argument (real pipes are split by the
# decomposer first), so excluding it would only break the rule on quoted
# args. The '>' exclusion stays so a stdin filter with a redirect is not denied.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}(cat|head|tail)\\b[^>]*/"
reason = "Invoke the Read tool: file_path=<path>, with optional offset and limit. For piped stdout, `... | head -5`, `... | tail -5`, `... | cat` are still allowed. `cat`/`head`/`tail` against a file path is rejected because Read provides line numbers and bounded slicing."

# Deny grep/rg when searching files (any path-shaped argument, relative or absolute).
# Pipeline leaves like 'grep pattern' (no file, filtering stdin) are not matched.
# Covers command/env prefixes and absolute-path binaries via ${TOOL_PATH}.
# The char class is [^>] (not [^>|]): grep patterns routinely contain '|'
# alternation, and excluding '|' made the rule stop scanning before the file
# path. Real pipelines are already split by the decomposer, so a bare '|' here
# is always inside a quoted pattern, never a pipe boundary. The '>' exclusion
# stays so a stdin filter with a redirect ('grep pat > /tmp/out') is not denied.
# grep/rg with a CWD-relative path argument is ALLOWED (falls through to the
# SAFE_CMDS allow). Deny only when the path argument is absolute (`/...`), home
# (`~`), or uses `..` traversal -- those escape the current working directory.
# The trailing `\s(/|~|\.\.)` matches a space then an absolute/home/traversal
# token. Pipeline leaves (`... | grep pat`, no file arg) never match. Char class
# is [^>] so a redirect is not treated as a path and grep `|` alternation in the
# pattern does not stop the scan.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}(grep|rg)\\b[^>]*\\s(/|~|\\.\\.)"
command_exclude_regex = "\\s(${SAFE_ABS_ZONES})(?:/|\\s|$)"
reason = "Use a relative path or a workspace path (e.g. `grep pat src/file.py`, `rg pat ~/<workspace>/repo/`). Relative, workspace (`~/<workspace>/...`, `/Users/<me>/<workspace>/...`), and `/tmp` paths are allowed. A path outside those safe zones -- arbitrary absolute (`/etc/...`), bare `~`, or `..` traversal -- is rejected for scope control: it can flood context with an unbounded scan. To read one known file by an out-of-zone absolute path use the Read tool. Pipeline filters on bounded stdout stay allowed (`... | grep pat`)."

# Allow grep/rg by name (path zone is enforced by the deny rules above, which
# run first). This rule deliberately has NO command_exclude_regex: the shared
# SAFE_CMDS allow excludes ${NO_CMD_SUB}, which is not single-quote-aware and
# wrongly blocked searches whose PATTERN contains a literal backtick or `$(`
# inside quotes (e.g. `grep '`references/' file`, `grep '${.*}' file`). Real,
# unquoted command substitution in a grep/rg leaf is denied first by the
# structural cmd-sub guard (src/lib.rs is_search_cmd + has_active_cmd_sub), and
# out-of-zone paths are denied by the grep/rg path deny above. Bare-name anchor
# only (no ${TOOL_PREFIX}/${TOOL_PATH}), mirroring the SAFE_CMDS allow shape so a
# `command grep`/`env grep` wrapper or absolute-path binary keeps its prior
# passthrough/deny behavior.
[[allow]]
tool = "Bash"
command_regex = "^(grep|rg)\\b"

# egrep/fgrep are deprecated. Deny the file-path form outright (no relative
# carve-out, unlike grep/rg) and steer to `grep -E` / `grep -F`.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}(egrep|fgrep)\\b[^>]*/"
reason = "`egrep` and `fgrep` are deprecated; use `grep -E` or `grep -F` instead. With a file path argument they are rejected -- switch to `grep` with a CWD-relative path, or pipe bounded stdout (`... | grep pat`)."

# Deny absolute-path grep/rg unconditionally. Calling via absolute path
# (/usr/bin/grep, /opt/homebrew/bin/rg) is a deliberate bypass attempt.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}/(?:[^/\\s]+/)+(grep|egrep|fgrep|rg)\\b"
reason = "Use the bare PATH form (`grep ...`, `rg ...`) rather than an absolute binary path (`/usr/bin/grep`, `/opt/homebrew/bin/rg`). Relative `grep`/`rg` is allowed; calling via absolute binary path is rejected to keep PATH discipline visible and avoid bypass shapes."

# Deny absolute-path forms of safe utilities. Steer to bare PATH form.
# Passthrough audit (2026-05-15) showed /usr/bin/<tool> variants falling
# through to user approval for the entire safe-utility list. Governing
# rule: passthrough is an unresolved decision; absolute-path variants are
# resolved as deny + steer to PATH. The grep/find absolute-path denies
# above already cover those tools (which have their own context-specific
# steer messages); this rule covers every OTHER safe utility.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}/(?:[^/\\s]+/)+(${SAFE_CMDS})\\b"
command_exclude_regex = "/(?:[^/\\s]+/)+(grep|egrep|fgrep|rg|find)\\b"
reason = "Use the bare PATH form (e.g. `whoami`, `xxd`, `cat ...`) rather than the absolute path (`/usr/bin/whoami`, `/usr/bin/xxd`, `/bin/cat`). Absolute-path forms of safe utilities are rejected to keep PATH discipline visible and to avoid bypass shapes."

# Deny sed -n for line extraction when reading a file (path-shaped argument).
# Pipeline leaves like '... | sed -n 250,400p' (no file, paginating stdin) are
# NOT matched and remain allowed -- Read can't substitute for stdout pagination.
# Covers absolute-path invocations and command/env prefixes.
# Char class is [^>] (not [^>|]): a sed address regex can contain '|', and
# excluding it would stop the scan before the file path -- the same regression
# the grep file-search deny had. Real pipes are split by the decomposer first.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}sed\\s+-n\\b[^>]*/"
reason = "Invoke the Read tool: file_path=<path>, offset=<start>, limit=<count> to extract a line range from a file. For piped stdout, `... | sed -n '10,20p'` is still allowed. `sed -n` against a file path is rejected because Read does file-range extraction directly."

# Deny awk entirely (every leaf, including pipeline leaves -- the decomposer
# splits on '|' so a `... | awk ...` leaf is matched here too). Unlike the
# grep/sed denies, this has no file-path guard: awk is denied even as a stdin
# filter. Rationale: in passthrough-log review, agent awk usage was almost
# always line-matching ("find lines matching X, print them"), which is exactly
# what git ls-files + Read or a _temp.py helper covers, and the awk attempts
# were consistently overcomplicated. awk's '/regex/' syntax also makes a
# reliable file-vs-stdin guard impractical.
# Covers awk, gawk, mawk via command/env prefixes and absolute paths.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}(awk|gawk|mawk)\\b"
reason = "For line-matching in files, use `git ls-files <pathspec>` to identify candidates and use the Read tool on targeted files. Piped `grep` or `rg` on already-bounded stdout stays allowed (`<allowed cmd> | grep pat`, `<allowed cmd> | rg pat`). For field extraction from piped output use `cut`. For structured parsing write a `_temp.py` helper that starts from a bounded candidate list such as `git ls-files`, then run it with `source source_me.sh && python3 _temp.py`. `awk`/`gawk`/`mawk` is denied including pipeline leaves -- no pipe exception."

# Deny bash/sh/zsh -n shell-script syntax checks. Steers agents away from using
# shell as a script-analysis tool. Inspect with the Read tool instead.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}(bash|sh|zsh)\\s+-n\\b"
reason = "Inspect the script with the Read tool. To execute, use `bash script.sh` or ask for user approval. `bash`/`sh`/`zsh -n` syntax-check is rejected; the shell is not the right tool for script analysis."

# Deny `less <file>` -- it is `cat`-with-pager and should route through Read.
# The pipeline form (`... | less`) does not match (no path arg).
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}less\\b[^>]*/"
reason = "Invoke the Read tool: file_path=<path>, with optional offset and limit. `less <file>` is rejected because Read provides line numbers and bounded slicing; the pipeline form `... | less` is not the same shape and is not auto-allowed either."

# Deny pcregrep/ack/ag with a file path argument -- mirrors the grep/rg
# file-arg deny so agents do not switch grep variants to bypass scope control.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}(pcregrep|ack|ag)\\b[^>]*/"
reason = "Use `git ls-files <pathspec>` to identify candidate files, then use the Read tool on the relevant files. `pcregrep`, `ack`, and `ag` with a file path argument are rejected for the same scope-control reason as `grep`/`rg` with a file path; piped forms on bounded stdout stay allowed."

# Deny `node -e` / `node --eval` inline JS. Same risk profile as
# `python -c`: arbitrary inline code, hard to lint/audit, can hide
# command substitution and child_process calls. Steered to `_temp.mjs`.
# The `(-\S+\s+)*` clause allows interpreter flags before `-e`/`--eval`
# (matches the python -c rule shape).
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}node\\s+((--import|--loader|--require|--experimental-loader|-r)(=|\\s+)\\S+\\s+|-\\S+\\s+)*(-e|--eval)\\b"
reason = "Write the JS to a `_temp.mjs` file and run `node _temp.mjs`. `node -e` / `node --eval` with inline code is rejected because it is hard to lint and debug, and can hide command substitution or child_process calls. Same rule shape as `python -c`."

# Deny `swift -e` / `swift --eval` inline Swift. Same risk profile as
# `python -c` and `node -e`: arbitrary inline code, hard to lint/audit.
# In the 2026-06-16 audit `swift -e 'import XCTest; print(...)'` was used
# as toolchain archaeology while `swift build`/`test` were stalling; with
# the swift allow rule in place, run `swift build`/`swift test` directly.
# The `(-\S+\s+)*` clause allows interpreter flags before `-e`/`--eval`
# (matches the python -c / node -e rule shape).
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}swift\\s+((-I|-L|-D|-framework|-Xcc|-Xswiftc|--package-path)(=|\\s+)\\S+\\s+|-\\S+\\s+)*(-e|--eval)\\b"
reason = "Write the Swift to a `_temp.swift` file and run it, or run `swift build`/`swift test` directly. `swift -e` / `swift --eval` with inline code is rejected because it is hard to lint and debug. Same rule shape as `python -c` / `node -e`."

# Deny `xcode-select`. In the 2026-06-16 audit it appeared only as
# toolchain archaeology (`xcode-select -p`) while the agent was flailing
# around a stalled `swift test`. The toolchain is already configured;
# probing it adds no real work. The `-select` suffix is anchored with `\b`
# so this never matches `xcrun` (which stays allowed in SYS_CMDS).
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}xcode-select\\b"
reason = "Do not probe the Xcode toolchain with `xcode-select`. It is already configured; run `swift build` / `swift test` directly. If a tool is genuinely missing it will fail loudly with a clear error, which is the correct feedback."

# Deny `printf` used as a Write-tool replacement: redirected to a file
# (`>`, `>>`) or piped to `tee`. Steers to the Write tool (or Edit for
# appends). Bare `printf '...'` for stdout formatting stays allowed.
# 2026-05-18 audit: 53 passthrough entries were `printf ... > FILE` /
# `>> FILE` / `| tee FILE` writing large markdown/code blobs.
# 2026-05-29 audit: the old `[^|;&]*` body gate let markdown audit reports
# leak through -- table rows (`|`) and HTML entities (`&amp;`, `&alpha;`)
# in the printf content tripped the negated class before the regex reached
# the `>` redirect. Replaced with `(?s).*` so the body may contain any
# char (including newlines for multiline content). The redirect operator is
# anchored at start-of-leaf or after whitespace ((?:^|\s)>>?) so a literal
# arrow inside content (e.g. `a->b`) does not false-positive; a real
# whitespace-separated `printf '...' > file` still matches. Tradeoff: a
# printf that prints literal " > " text to stdout is denied (steered to the
# Write tool / echo) -- acceptable and rare.
[[deny]]
tool = "Bash"
command_regex = "(?s)^${TOOL_PREFIX}${TOOL_PATH}printf\\b.*(?:(?:^|\\s)>>?\\s*[^\\s>]|\\|\\s*tee\\b)"
reason = "Use the Write tool for new files or the Edit tool for appends. `printf ... > FILE`, `printf ... >> FILE`, and `printf ... | tee FILE` are rejected because they bypass the Write/Edit tools that provide diffs, line counts, and proper change tracking."

# --- WeBWorK steering ---

# Deny perl on WeBWorK PG/PGML files -- PGML is not standard Perl
[[deny]]
tool = "Bash"
command_regex = "^perl\\b.*\\.pg(ml)?\\b"
reason = "Use the `/webwork-writer` skill lint guide to validate WeBWorK problems. Running `perl` on .pg/.pgml files is rejected because PGML is not standard Perl."

# Deny perl in-place edits (the -i flag) -- steer to the Edit tool. Matches a bare
# `-i`, a backup-suffix `-i.bak`, or `-i` clustered with loop/print switches
# (-pi, -0pi, -ip, -ni). The switch-letter class keeps `-MTime::HiRes`, `-I/inc`
# (uppercase I), and plain loop flags (-pe, -ne) from matching; `perl script.pl`
# and `perl --version` are unaffected.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}perl\\b.*\\s-(i(\\.[^\\s]*)?|[pnlaws0]*i[pnlaws0]*)(\\s|$)"
reason = "Use the Edit tool to change files in place. It applies the edit and shows a reviewable diff."

# Allow plain `perl <script>.pl` script execution. Analogous to
# `python3 <script>.py`. The WeBWorK deny above still fires first on
# `.pg`/`.pgml` extensions (steered to /webwork-writer skill).
[[allow]]
tool = "Bash"
command_regex = "^perl\\s+[A-Za-z0-9_./-]+\\.pl(\\s|$)"
command_exclude_regex = "${NO_CMD_SUB}"

# --- TypeScript steering ---

# Deny direct tsc via node_modules paths -- steer to 'npx tsc'
[[deny]]
tool = "Bash"
command_regex = "\\bnode_modules/(\\.bin|typescript/bin)/tsc\\b"
reason = "Use `npx tsc`. If it fails because TypeScript is missing, ask the user to run `npm install --save-dev typescript` (or `npm install -g typescript` for a global install). Calling tsc via `node_modules` paths is rejected; do not work around the missing install with absolute paths, `node node_modules/...`, or `source_me.sh` chains."

# --- Unavailable tools ---

# Deny gh CLI (not installed)
[[deny]]
tool = "Bash"
command_regex = "^gh\\b"
reason = "N/A: `gh` is not installed on this system. Ask the user to run GitHub CLI operations manually, or skip them."

# --- Media tools steering ---

# Steer ffprobe to mediainfo for the cases mediainfo handles cleanly.
# ffprobe stays available for chapter atoms, packet/frame timing, and
# lavfi/synthetic sources -- the cases mediainfo cannot do.
[[deny]]
tool = "Bash"
command_regex = "^ffprobe(\\s|$)"
command_exclude_regex = "(\\s|^)-show_(chapters|packets|frames)\\b|(\\s|^)-f\\s+lavfi\\b"
reason = "Use `mediainfo --Output=JSON <file>` for container, codec, and track metadata. `ffprobe` is allowed only with `-show_chapters`, `-show_packets`, `-show_frames`, or `-f lavfi` -- the cases mediainfo cannot handle."

# --- macOS GUI and process steering ---

# Deny screencapture with command substitution (e.g. -l $(osascript ...)).
# Plain screencapture stays allowed via SYS_CMDS; only the cmd-sub form is steered.
[[deny]]
tool = "Bash"
command_regex = "^screencapture\\b.*(${NO_CMD_SUB})"
reason = "Look up the window id in a separate step, then pass that literal id to screencapture. A screenshot helper script can target the window for you."

# Deny osascript (AppleScript) -- it can drive and inspect arbitrary apps.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}osascript\\b"
reason = "Ask the user to run any scripted app step. For app screenshots, use a dedicated screenshot helper that targets the window for you."

# Deny the claude CLI in dispatch mode (-p / --print) -- steer to the Agent tool.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}claude\\b.*\\s(-p|--print)\\b"
reason = "Use the Agent tool to dispatch subagents. It runs in your current session, stays observable, and follows the same permission rules."

# Deny kill / pkill / killall -- steer to graceful self-exit + pgrep. The agent
# tends to hand-roll PID juggling; killing processes is left to the user.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}(kill|pkill|killall)\\b"
reason = "Let the program exit on its own. For an app under test, launch it with a concrete timeout such as --auto-exit=3. To find a running instance, use `pgrep -l <app-name>` and let the user stop it."

# --- Sensitive-path reads ---
# Block any command that references credential or auth files. Match is
# literal-path; ordinary docs that mention "ssh_config" or similar do
# not contain "/etc/passwd" or "~/.ssh/" tokens. Placed before the
# broad allow blocks so the deny fires first.
[[deny]]
tool = "Bash"
command_regex = "(/etc/(passwd|shadow|sudoers|hosts)\\b|~/\\.ssh/|~/\\.aws/credentials\\b|/Users/[^/]+/\\.ssh/|/Users/[^/]+/\\.aws/credentials\\b)"
reason = "Ask the user for user or host info. Reading system credential or auth files (`/etc/passwd`, `/etc/shadow`, `/etc/sudoers`, `~/.ssh/`, `~/.aws/credentials`) is rejected."

# --- Registry-mutating package commands ---
# These change global state on package registries (or local credential
# state). Always require explicit human authorization. The cargo allow
# rule below already excludes these subcommands, but a deny here makes
# the steer message explicit instead of silent passthrough.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}cargo\\s+(publish|yank|login|logout|owner)\\b"
reason = "Ask the user to run registry-mutating cargo commands manually (`publish`/`yank`/`login`/`logout`/`owner`). They require human authorization because they change global registry state."

[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}npm\\s+(publish|unpublish|deprecate|owner|adduser|login|logout|token)\\b"
reason = "Ask the user to run registry-mutating npm commands manually (`publish`/`unpublish`/`deprecate`/`owner`/`adduser`/`login`/`logout`/`token`). They require human authorization because they change global registry state."

# --- System package install ---
# brew install/uninstall/upgrade modifies system-wide packages. Deny
# unconditionally; the user runs these themselves.
[[deny]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}brew\\s+(install|uninstall|reinstall|upgrade|tap|untap|cask)\\b"
reason = "Ask the user to run `brew install`/`uninstall`/`reinstall`/`upgrade`/`tap`/`untap`/`cask` manually. System-package modification is rejected from agents."

# --- Path scoping (blast radius control) ---

# Deny writes to system directories
[[deny]]
tool = "Write"
file_path_regex = "^/(etc|usr|opt|System|Library)/"
reason = "Use project paths under ~/projects/ or scratch files in /tmp/. Writing to system directories (`/etc/`, `/usr/`, `/opt/`, `/System/`, `/Library/`) is rejected."

[[deny]]
tool = "Edit"
file_path_regex = "^/(etc|usr|opt|System|Library)/"
reason = "Use project paths under ~/projects/ or scratch files in /tmp/. Editing system files (`/etc/`, `/usr/`, `/opt/`, `/System/`, `/Library/`) is rejected."

# ===================================================================
# ALLOW rules
# The shell command decomposer (brush-parser) splits compound commands
# (&&, ||, ;, pipes, loops) and unwraps bash -c "..." patterns into
# leaf sub-commands. Env-var assignments (e.g. NODE_PATH=/foo) are
# stripped from leaves so TOML rules match the normalized command only.
# Each leaf is checked independently, so simple per-command rules suffice.
# ===================================================================

# --- rm exceptions ---
# rm is denied by default. These exceptions cover safe, reversible deletions:
# git rm (tracked, reversible via git), /tmp (scratch), cache dirs, _prefixed files.

# Allow git rm with relative paths only (tracked, reversible)
[[allow]]
tool = "Bash"
command_regex = "\\bgit\\s+rm\\s+(-[a-zA-Z]+\\s+)*[^/\\s-]"
command_exclude_regex = "${NO_CMD_SUB}"

# Allow rm in /tmp
[[allow]]
tool = "Bash"
command_regex = "\\brm\\s+(-[a-zA-Z]+\\s+)*/tmp/\\S+"
command_exclude_regex = "${NO_CMD_SUB}"

# Allow rm on cache directories
[[allow]]
tool = "Bash"
command_regex = "\\brm\\s+(-[a-zA-Z]+\\s+)*\\S*[Cc]ache"
command_exclude_regex = "${NO_CMD_SUB}"

# Allow rm on underscore-prefixed files (temporary/scratch files)
[[allow]]
tool = "Bash"
command_regex = "\\brm\\s+(-[a-zA-Z]+\\s+)*(\\S*/)?_\\S+"
command_exclude_regex = "${NO_CMD_SUB}"

# Allow rm under ~/nsh/ (matches the Write/Edit tool zone). Hard-deny rules
# above still block .. traversal and system-directory paths.
[[allow]]
tool = "Bash"
command_regex = "\\brm\\s+(-[a-zA-Z]+\\s+)*(/Users/[^/\\s]+/nsh/|~/nsh/)\\S+"
command_exclude_regex = "${NO_CMD_SUB}"

# Allow rm on bare relative paths (no leading /, ~, $, .., or *). Same blast
# radius as Write/Edit: an agent that can Write a source file can already
# overwrite it; rm is no more dangerous. Hard-deny rules above still block
# .. traversal and dangerous shapes.
[[allow]]
tool = "Bash"
command_regex = "\\brm\\s+(-[a-zA-Z]+\\s+)*[A-Za-z][A-Za-z0-9_./-]*"
command_exclude_regex = "${NO_CMD_SUB}"

# Allow rmdir unconditionally, including `rmdir -p` (remove empty parent
# chain). POSIX rmdir only removes empty directories; a non-empty target
# errors out, and -p errors out at the first non-empty parent. No -r/-R
# behavior exists. Safe drop-in for cleanup after `git mv A/* B/ && rmdir -p A/`.
[[allow]]
tool = "Bash"
command_regex = "^rmdir(\\s|$)"
command_exclude_regex = "${NO_CMD_SUB}"

# --- ffprobe: explicit allow for the four mediainfo-cannot-do flags ---
# Paired with the ffprobe deny rule above. The deny's exclude lets these
# pass; this allow makes them silent rather than passthrough.
[[allow]]
tool = "Bash"
command_regex = "^ffprobe\\b.*((\\s)-show_(chapters|packets|frames)\\b|(\\s)-f\\s+lavfi\\b)"
command_exclude_regex = "${NO_CMD_SUB}"

# --- Tools scoped to /tmp scratch dirs ---
# Allow any tool listed in ${TMP_SCOPED_CMDS} when the leaf references
# /tmp (or /private/tmp) and does not touch any non-scratch absolute root.
# Virtual sources like `-f lavfi -i sine=...`, stdin `-`, or sox null
# sink `-n` ride along because the rule still requires a real /tmp/ path
# token in the leaf. Add new tools by editing TMP_SCOPED_CMDS above.
[[allow]]
tool = "Bash"
command_regex = "^(${TMP_SCOPED_CMDS})\\b.*(\\s|=)(/private)?/tmp/"
command_exclude_regex = "(\\s|^|=)/(${NON_TMP_ROOTS})\\b|${NO_CMD_SUB}"

# Run a freshly-built first-party binary from the current working directory.
# SwiftPM emits under .build/ (e.g. .build/debug/, .build/arm64-apple-macosx/debug/);
# Cargo emits under target/debug/ and target/release/. CWD-relative only (the leading
# ./ is optional). Absolute build paths do not match and stay passthrough; any `..`
# trips ${NO_TRAVERSAL}; a $(...) argument fails ${NO_CMD_SUB} and falls to passthrough.
# (2026-06-16 audit: 51/179 real passthroughs were running just-built .build/ binaries.)
[[allow]]
tool = "Bash"
command_regex = "^(\\./)?(${BUILD_OUT})"
command_exclude_regex = "${NO_CMD_SUB}|${NO_TRAVERSAL}"

# Run a freshly-built first-party binary by its workspace-absolute path. Same
# trust as the CWD-relative rule above, extended to the absolute-in-workspace
# form (`~/<ws>`, `/Users/<me>/<ws>`, `$HOME/<ws>`) so a binary referenced by its
# full workspace path also auto-allows. Bounded to the workspace root; `..` trips
# ${NO_TRAVERSAL}; a $(...) argument fails ${NO_CMD_SUB}. Absolute paths outside
# the workspace stay passthrough.
[[allow]]
tool = "Bash"
command_regex = "^(?:~|/Users/[^/\\s]+|[$]HOME)/${WORKSPACE_ROOT}/[^\\s]*?(${BUILD_OUT})"
command_exclude_regex = "${NO_CMD_SUB}|${NO_TRAVERSAL}"

# ffmpeg decode-only validation: `-f null -` (or `-f null /dev/null`) decodes the
# input and writes nothing, so the input path may live anywhere local. Real file
# outputs are still gated by the /tmp-scoped rule above.
[[allow]]
tool = "Bash"
command_regex = "^ffmpeg\\b.*(\\s)-f\\s+null\\s+(-|/dev/null)\\s*$"
command_exclude_regex = "${NO_CMD_SUB}"

# -------------------------------------------------------------------
# Bash: Python tooling
# Python execution is core workflow. source_me.sh sets up the environment.
# Allow python3, pytest, pyflakes directly. Block command substitution.
# Env-var prefixes (PYTHONPATH=...) are stripped by the decomposer.
# -------------------------------------------------------------------

# Broad python allow, with `-m <module>` carve-outs so machine-changing modules
# (`pip`, `venv`, `ensurepip`) fall through to user approval, and `json.tool`
# with a file path falls through to passthrough so the agent uses the Read tool
# instead. Other `-m <module>` shapes (`pytest`, `pyflakes`, `http.server`,
# `json.tool` on stdin, `timeit`, `unittest`) remain auto-allowed by this rule.
[[allow]]
tool = "Bash"
command_regex = "^(python3?|/opt/homebrew/opt/python@3\\.12/bin/python3\\.12|PYTHONPATH=)\\s?"
command_exclude_regex = "${NO_CMD_SUB}|\\s+-m\\s+(pip|venv|ensurepip)\\b|\\s+-m\\s+json\\.tool\\s+\\S"

# Allow homebrew python running .py files directly (but not -c)
[[allow]]
tool = "Bash"
command_regex = "^/opt/homebrew/bin/python3[^\\s]*\\s+[^-]"
command_exclude_regex = "\\s-c\\b|${NO_CMD_SUB}"

# Allow: pytest and pyflakes invoked directly
[[allow]]
tool = "Bash"
command_regex = "^(pytest|pyflakes)\\s"
command_exclude_regex = "${NO_CMD_SUB}"

# -------------------------------------------------------------------
# Bash: local runtime execution (node, deno)
# Runtimes can execute code, so they get constrained patterns instead
# of blanket SAFE_CMDS membership. npx is excluded (passthroughs to
# user prompt because it may fetch remote packages).
# Env-var prefixes (NODE_PATH=...) are stripped by the decomposer,
# so these rules match both prefixed and non-prefixed forms.
# -------------------------------------------------------------------

# Broad node allow for the local dev loop: scripts, test/watch/check modes, and
# directory-form test runs (`node --import tsx --test tests/`) that the older
# file-leaf rule missed. Same trust already granted to `./script.sh` and
# `node script.js` -- running first-party code from the working tree. The
# exclude mirrors the node-eval deny's flag-skip clause so it blocks inline JS
# (`-e`/`--eval`) only when those are node's OWN flags, never when they are a
# script's argument (`node script.js -e foo` stays allowed). Real inline eval is
# already denied by the dedicated node-eval deny above (checked first); this
# exclude is belt-and-suspenders. Command substitution is blocked.
[[allow]]
tool = "Bash"
command_regex = "^node\\b"
command_exclude_regex = "^node\\s+((--import|--loader|--require|--experimental-loader|-r)(=|\\s+)\\S+\\s+|-\\S+\\s+)*(-e|--eval)\\b|${NO_CMD_SUB}"

# npx with known-safe local dev tool packages only.
# Unknown packages still passthrough to user prompt.
# Optional npx global flags may precede the package: --prefix <path> / -p
# <path> / --package <pkg> (select the install root), --yes/-y, --no-install,
# --no. This covers monorepo invocations like
# `npx --prefix /path/to/project tsc --version`.
[[allow]]
tool = "Bash"
command_regex = "^npx\\s+((--prefix(=|\\s+)\\S+|-p\\s+\\S+|--package(=|\\s+)\\S+|--yes|-y|--no-install|--no)\\s+)*(tsc|tsx|eslint|prettier|playwright|esbuild|vitest|jest|vite|http-server|serve|tailwindcss|@biomejs/biome|nodemon|concurrently)(\\s|$)"
command_exclude_regex = "${NO_CMD_SUB}"

# eslint -- local code linter (read-only analysis)
[[allow]]
tool = "Bash"
command_regex = "^eslint\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# prettier -- code formatter
[[allow]]
tool = "Bash"
command_regex = "^prettier\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# deno subcommands for local development (not remote URLs).
# deno eval excluded -- arbitrary inline execution is too broad;
# it falls through to passthrough (user prompted).
[[allow]]
tool = "Bash"
command_regex = "^deno\\s+(run|check|fmt|lint|test)\\b"
command_exclude_regex = "https?://|${NO_CMD_SUB}"

# deno --version (info only)
[[allow]]
tool = "Bash"
command_regex = "^deno\\s+--version"

# -------------------------------------------------------------------
# Bash: podman read-only inspection, build, compose, and exec probes.
# Destructive operations (rm -f, prune, kill, force stop) are denied above.
# Note: arguments to 'podman exec' are NOT re-decomposed by the hook, so
# destructive shell inside a container is a container-level concern.
# -------------------------------------------------------------------

[[allow]]
tool = "Bash"
command_regex = "^podman\\s+(ps|pod|images|image\\s+ls|logs|inspect|info|version|port|top|stats|history|diff|build|compose|start|stop|restart|pull|tag|cp|exec)\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# -------------------------------------------------------------------
# Bash: cargo
# Rust build tool for this repo. Allow all subcommands except those
# that publish to registries or install system-wide binaries.
# -------------------------------------------------------------------

[[allow]]
tool = "Bash"
command_regex = "^cargo\\b"
command_exclude_regex = "\\b(publish|yank|login|logout|owner|install)\\b|${NO_CMD_SUB}"

# -------------------------------------------------------------------
# Bash: swift
# SwiftPM build tool. Treated like cargo: allow the whole dev loop
# (build/test/run/package/--version), exclude only the registry-mutating
# package-registry subcommands and inline-eval. The `-e`/`--eval` inline
# form is denied separately above (mirrors `python -c` / `node -e`); the
# exclude here is a belt-and-suspenders guard so the broad `^swift\b`
# allow never re-allows an inline-eval leaf. `swift build`/`swift test`
# fetch dependencies over the network -- the same accepted trade-off as
# `cargo build`.
[[allow]]
tool = "Bash"
command_regex = "^swift\\b"
command_exclude_regex = "(\\s|^)(-e|--eval)\\b|\\bpackage-registry\\s+(login|logout|set)\\b|${NO_CMD_SUB}"

# -------------------------------------------------------------------
# Bash: rustc -- local Rust compiler. Compiles source from the working tree;
# same trust as `cargo build`. Command substitution is blocked.
# -------------------------------------------------------------------
[[allow]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}rustc\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# -------------------------------------------------------------------
# Bash: rustup read-only queries. Reports installed toolchains/targets and the
# active toolchain. Mutating verbs (install, default, override, update,
# toolchain install, target add) are absent, so they stay passthrough -- installs
# stay gated for per-run user approval.
# -------------------------------------------------------------------
[[allow]]
tool = "Bash"
command_regex = "^rustup\\s+(show|which|--version|component\\s+list|toolchain\\s+list|target\\s+list)\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# -------------------------------------------------------------------
# Bash: sips (read-only metadata query)
# `sips -g <prop>` reads image properties (pixelWidth/Height, format) and
# never writes. Allowed regardless of path because it is read-only by form.
# Any write/convert flag disqualifies the leaf (it falls through to
# passthrough): -s/--setProperty, -z/--resample*, --crop*/--pad*,
# -r/--rotate, -f/--flip, -o/--out, -d/--delete*, -i/--addIcon,
# -m/--matchTo*, -e/--embedProfile. For transforms, use `magick` in /tmp.
# (2026-06-16 audit: 4 records were `sips -g` queries on ~/Documents.)
[[allow]]
tool = "Bash"
command_regex = "^sips\\b.*(\\s|^)(-g|--getProperty)\\b"
command_exclude_regex = "(\\s|^)(-s|--setProperty|-z|--resample\\w*|--cropToHeightWidth|--cropOffset|--padToHeightWidth|--padColor|-r|--rotate|-f|--flip|-o|--out|-d|--delete\\w*|-i|--addIcon|-m|--matchTo\\w*|-e|--embedProfile)\\b|${NO_CMD_SUB}"

# Bash: magick read-only inspection (`identify`, `-list`). Neither writes.
# `magick` is in TMP_SCOPED_CMDS, so transform/convert forms only auto-allow
# under /tmp; these read-only subverbs are safe at any path (e.g. the
# screenshot->docs workflow `magick identify repo/docs/x.png`).
[[allow]]
tool = "Bash"
command_regex = "^magick\\s+(identify|-list)\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# Bash: sips write forms (crop, resample, convert) scoped to /tmp.
# Mirrors the tmp-scoped rule shape: requires a /tmp path and disqualifies any
# non-scratch absolute root. Lets the agent crop screenshots into /tmp; a write to
# ~/ or /Users falls through to passthrough.
[[allow]]
tool = "Bash"
command_regex = "^sips\\b.*(\\s|=)(/private)?/tmp/"
command_exclude_regex = "(\\s|^|=)/(${NON_TMP_ROOTS})\\b|${NO_CMD_SUB}"

# Bash: screenshot (easy-screenshot CLI). Captures a local window to a PNG;
# this is the screenshot-docs skill's primary local-capture command.
[[allow]]
tool = "Bash"
command_regex = "^screenshot\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# Bash: plutil read-only forms. `-lint` validates and never writes. `-convert` can
# write (in place by default, or to `-o <file>`), so allow it only when output is
# stdout (`-o -`). Convert-to-file forms fall through to passthrough.
[[allow]]
tool = "Bash"
command_regex = "^plutil\\s+-lint\\b"
command_exclude_regex = "${NO_CMD_SUB}"

[[allow]]
tool = "Bash"
command_regex = "^plutil\\s+-convert\\b.*\\s-o\\s+-(\\s|$)"
command_exclude_regex = "${NO_CMD_SUB}"

# Bash: xmllint read/format only. Reads, validates, and pretty-prints XML to
# stdout. The exclude blocks the output-file flags (-o/--output) so in-place or
# to-file writes fall through to passthrough.
[[allow]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}xmllint\\b"
command_exclude_regex = "(\\s|^)(-o|--output)\\b|${NO_CMD_SUB}"

# Bash: strings dumps printable byte sequences from a file. Read-only; never
# writes. Allowed at any path.
[[allow]]
tool = "Bash"
command_regex = "^${TOOL_PREFIX}${TOOL_PATH}strings\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# Bash: fc-list lists installed fonts. Read-only system query.
[[allow]]
tool = "Bash"
command_regex = "^fc-list\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# Bash: diskutil read-only verbs only. `list` and `info` report layout and volume
# metadata. Destructive verbs (eraseDisk, partitionDisk, unmountDisk, ...) live in
# the same binary, so match only the read verbs and let the rest passthrough.
[[allow]]
tool = "Bash"
command_regex = "^diskutil\\s+(list|info)\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# -------------------------------------------------------------------
# Bash: git allowlist
# Read-only and local-only git operations. Excludes: commit (human-only),
# stash, clean, reset --hard, push --force, rebase (all denied or passthrough).
# -------------------------------------------------------------------

# Global flags before the subcommand are skipped: -C <path> (run in dir),
# -c <key=val> (one-shot config, e.g. `git -c status.renames=true status`),
# and --no-pager (e.g. `git --no-pager diff`). The subcommand itself is still
# gated to the read-only / local-only allowlist; destructive forms
# (reset --hard, push --force) are denied separately above.
[[allow]]
tool = "Bash"
command_regex = "^git\\s+((-C\\s+\\S+|-c\\s+\\S+|--no-pager)\\s+)*(add|branch|cat-file|check-ignore|checkout|diff|fsck|ls-files|ls-tree|log|mv|pull|reflog|remote|reset|restore|rev-parse|show|status|worktree)(\\s|$)"
command_exclude_regex = "${NO_CMD_SUB}"

# -------------------------------------------------------------------
# Bash: launchctl read-only queries
# -------------------------------------------------------------------

# Allow launchctl read-only queries (list, print, blame, dumpstate)
[[allow]]
tool = "Bash"
command_regex = "^launchctl\\s+(list|print|blame|dumpstate|dumpjpcategory)\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# -------------------------------------------------------------------
# Bash: mkdocs local development
# -------------------------------------------------------------------

# Allow mkdocs read-only and local subcommands
[[allow]]
tool = "Bash"
command_regex = "^mkdocs\\s+(--version|build|serve)\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# -------------------------------------------------------------------
# Bash: shell and Python scripts
# -------------------------------------------------------------------

# Run a shell script directly. The -n syntax-check form is denied above
# (steered to the Read tool) so this allow only covers actual execution.
[[allow]]
tool = "Bash"
command_regex = "^bash\\s+[A-Za-z0-9_./-]+\\.sh\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# Execute a shell script via relative path (./script.sh)
[[allow]]
tool = "Bash"
command_regex = "^\\./[A-Za-z0-9_.-]+\\.sh\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# Execute a local binary under ./bin/ (e.g. ./bin/Volume.exe, ./bin/runner)
# Project repos that ship compiled tools commonly place them in bin/.
[[allow]]
tool = "Bash"
command_regex = "^\\./bin/[A-Za-z0-9_.-]+(\\.exe)?\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# Execute a Python script via relative path (./script.py, ./dir/script.py)
[[allow]]
tool = "Bash"
command_regex = "^\\./[A-Za-z0-9_/./-]+\\.py\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# Relative-path .py scripts without ./ prefix (e.g. tools/runner.py -i ...)
# The decomposer splits "source source_me.sh && tools/runner.py -i file"
# into two leaves. The second leaf starts with a bare relative path.
[[allow]]
tool = "Bash"
command_regex = "^[A-Za-z0-9_][A-Za-z0-9_./-]+\\.py\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# Relative-path .sh scripts without ./ prefix (e.g. scripts/build.sh)
[[allow]]
tool = "Bash"
command_regex = "^[A-Za-z0-9_][A-Za-z0-9_./-]+\\.sh\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# -------------------------------------------------------------------
# Bash: common shell utilities (harmless, no runtimes)
# Env-var prefixes are stripped by the decomposer, so no separate
# env-prefixed rule is needed.
# -------------------------------------------------------------------

# Allow `cd "$(git rev-parse --show-toplevel)"` -- specific exemption.
# Passthrough audit (2026-05-15): this idiom appears frequently in agent
# chains and is benign (resolves to the repo root). The substitution body
# is whitelisted literally; any other `$(...)` body still fails this
# allow and falls back to the generic SAFE_CMDS rule (which excludes
# NO_CMD_SUB).
[[allow]]
tool = "Bash"
command_regex = "^cd\\s+[\"']?\\$\\(\\s*git\\s+rev-parse\\s+--show-toplevel\\s*\\)[\"']?\\s*$"

# Allow `xargs <flags>* (grep|egrep|fgrep|rg) ...` as a pipeline leaf.
# Passthrough audit (2026-05-15): `git ls-files <pathspec> | xargs grep
# PAT` is the canonical bulk-search pattern and was hitting passthrough
# because xargs reads its argv from stdin (no path arg visible). When
# this leaf is reached via pipe, the upstream leaf has already been
# evaluated against allow/deny rules, so this allow only completes the
# decision for the consumer half. Destructive xargs verbs (rm/chmod/
# chown/mv/sudo) stay denied by D3 above. NO_CMD_SUB is intentionally
# NOT applied: grep PATTERNs commonly contain literal `$(` (e.g.
# searching for a `node -e "$(...)"` shape inside test fixtures); the
# decomposer already extracts real `$(...)` substitutions as separate
# leaves and evaluates them on their own.
[[allow]]
tool = "Bash"
command_regex = "^xargs\\b(\\s+-[A-Za-z0-9]+(\\s+\\S+)?)*\\s+(grep|egrep|fgrep|rg)\\b"

# Non-mutating stdout / process-info commands that are safe to carry a
# `$(...)` substitution in their arguments: echo, printf, ps, pgrep. These
# cannot mutate the filesystem or read sensitive files based on the
# substituted value, and the decomposer extracts every `$(...)` inner command
# as its own leaf for independent deny/allow evaluation (deny wins), so a
# dangerous inner like `$(rm -rf /)` is still blocked while the outer leaf
# is allowed. This kills the common `echo "TAG_$(date +%s)"`,
# `printf '%s' "$(grep -c PAT f)"`, and `ps -p $(pgrep -f x)` passthrough
# stalls (2026-05-29 audit). Only backticks are excluded (the decomposer
# does not extract backtick substitutions). printf redirected to a file is
# still denied above (the deny runs first on the raw command).
[[allow]]
tool = "Bash"
command_regex = "^(echo|printf|ps|pgrep)\\b"
command_exclude_regex = "${NO_BACKTICK}"

[[allow]]
tool = "Bash"
command_regex = "^(${SAFE_CMDS})\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# -------------------------------------------------------------------
# Bash: package manager read-only queries
# pip/brew/npm info queries are safe. Install subcommands stay as
# passthrough so the user gets prompted before modifying the machine.
# -------------------------------------------------------------------

[[allow]]
tool = "Bash"
command_regex = "^(python3?\\s+-m\\s+)?pip3?\\s+(show|list|freeze|check)\\b"
command_exclude_regex = "${NO_CMD_SUB}"

[[allow]]
tool = "Bash"
command_regex = "^brew\\s+(list|info|search|--prefix)\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# Broad npm allow for info queries and repo-local script execution (`npm run`,
# `npm test`, `npm view`, `npm ls`, `npm pkg get`, read-only `npm audit`). The
# exclude keeps machine-changing and registry/auth forms gated: installs
# (install/i/ci/add/update/upgrade/uninstall/remove/rm/prune/dedupe), package
# execution (exec/x, parity with the npx whitelist), publish/auth, manifest
# writes (`npm pkg set|delete`), and `npm audit fix` all fall through to
# passthrough. Running first-party scripts from the local package.json is the
# same trust already granted to `./script.sh` and `node script.js`.
[[allow]]
tool = "Bash"
command_regex = "^npm\\b"
command_exclude_regex = "^npm\\s+(install|i|ci|add|update|upgrade|uninstall|remove|rm|prune|dedupe|exec|x|publish|unpublish|login|logout|adduser|owner|deprecate|token|star|unstar)\\b|^npm\\s+pkg\\s+(set|delete)\\b|^npm\\s+audit\\s+fix\\b|${NO_CMD_SUB}"

# npm run -- executes scripts defined in local package.json
[[allow]]
tool = "Bash"
command_regex = "^npm\\s+run\\b"
command_exclude_regex = "${NO_CMD_SUB}"

# npm install typescript -- the exact commands the tsc steering deny recommends.
# Matches only:
#   npm install --save-dev typescript
#   npm install -g typescript
# Any extra flags, packages, or variations still passthrough for user approval.
[[allow]]
tool = "Bash"
command_regex = "^npm\\s+install\\s+(--save-dev|-g)\\s+typescript\\s*$"
command_exclude_regex = "${NO_CMD_SUB}"

# -------------------------------------------------------------------
# Glob/Grep: search tools
# -------------------------------------------------------------------

[[allow]]
tool = "Glob"
file_path_regex = "${PROJECT_PATH}"
file_path_exclude_regex = "${NO_TRAVERSAL}"

[[allow]]
tool = "Glob"
file_path_regex = "${CLAUDE_PATH}"
file_path_exclude_regex = "${NO_TRAVERSAL}"

[[allow]]
tool = "Grep"
file_path_regex = "${PROJECT_PATH}"
file_path_exclude_regex = "${NO_TRAVERSAL}"

[[allow]]
tool = "Grep"
file_path_regex = "${CLAUDE_PATH}"
file_path_exclude_regex = "${NO_TRAVERSAL}"

# /tmp access for Glob/Grep (consistent with Read/Write/Edit /tmp rules)
[[allow]]
tool = "Glob"
file_path_regex = "^(/private)?/tmp(/|$)"

[[allow]]
tool = "Grep"
file_path_regex = "^(/private)?/tmp(/|$)"

# -------------------------------------------------------------------
# Read/Write/Edit: filesystem access zones
# Read: ~/projects/, ~/., site-packages, /tmp, /var/folders/ (broad for inspection)
# Write/Edit: ~/projects/, ~/.claude/, /tmp only (narrow for modification)
# This asymmetry lets Claude read widely but write only in approved zones.
# -------------------------------------------------------------------

[[allow]]
tool = "Read"
file_path_regex = "${HOME_PATH}"
file_path_exclude_regex = "${NO_TRAVERSAL}"

# Write/Edit access to project files under $HOME/projects/
[[allow]]
tool = "Write"
file_path_regex = "${PROJECT_PATH}"
file_path_exclude_regex = "${NO_TRAVERSAL}"

[[allow]]
tool = "Edit"
file_path_regex = "${PROJECT_PATH}"
file_path_exclude_regex = "${NO_TRAVERSAL}"

# Write/Edit access to Claude internal files (~/.claude/)
[[allow]]
tool = "Write"
file_path_regex = "${CLAUDE_PATH}"
file_path_exclude_regex = "${NO_TRAVERSAL}"

[[allow]]
tool = "Edit"
file_path_regex = "${CLAUDE_PATH}"
file_path_exclude_regex = "${NO_TRAVERSAL}"

# Read/Glob/Grep access to user LaunchAgents and Logs (debugging launchd jobs)
[[allow]]
tool = "Read"
file_path_regex = "${LIBRARY_READ_PATH}"
file_path_exclude_regex = "${NO_TRAVERSAL}"

[[allow]]
tool = "Glob"
file_path_regex = "${LIBRARY_READ_PATH}"
file_path_exclude_regex = "${NO_TRAVERSAL}"

[[allow]]
tool = "Grep"
file_path_regex = "${LIBRARY_READ_PATH}"
file_path_exclude_regex = "${NO_TRAVERSAL}"

# ARM Homebrew (/opt/homebrew) and Intel Homebrew (/usr/local) site-packages
[[allow]]
tool = "Read"
file_path_regex = "^/(opt/homebrew|usr/local)/lib/python3\\.[0-9]+/site-packages/"

# /tmp access for scratch files (macOS resolves /tmp to /private/tmp)
[[allow]]
tool = "Read"
file_path_regex = "^(/private)?/tmp/"

[[allow]]
tool = "Write"
file_path_regex = "^(/private)?/tmp/"

[[allow]]
tool = "Edit"
file_path_regex = "^(/private)?/tmp/"

# macOS per-user temp dirs (/var/folders/XX/YY/T/) - screenshots, temp files, etc.
# Scoped to the T/ temp subdirectory only, not caches (C/) or other dirs.
[[allow]]
tool = "Read"
file_path_regex = "^/var/folders/[^/]+/[^/]+/T/"

[[allow]]
tool = "Write"
file_path_regex = "^/var/folders/[^/]+/[^/]+/T/"

[[allow]]
tool = "Edit"
file_path_regex = "^/var/folders/[^/]+/[^/]+/T/"

# -------------------------------------------------------------------
# Web tools
# WebFetch and WebSearch are read-only information gathering. No local state change.
# -------------------------------------------------------------------

[[allow]]
tool = "WebFetch"

[[allow]]
tool = "WebSearch"

# -------------------------------------------------------------------
# Agent/Task orchestration
# Two-layer permission model:
#   Layer 1 (this hook): May Claude launch this agent type?
#     subagent_type checked against allowlist regex pattern.
#     Missing subagent_type passes through to user prompt (fail closed).
#   Layer 2 (agent .md specs in ~/.claude/agents/): What tools does the agent have?
#     Each agent's frontmatter lists its available tools.
# Uses a broad pattern match instead of hardcoded names so new agents
# in ~/.claude/agents/ are auto-allowed without TOML changes.
# -------------------------------------------------------------------

[[allow]]
tool = "Agent"
subagent_type_regex = "^[a-zA-Z][a-zA-Z0-9_:-]*$"

# -------------------------------------------------------------------
# Claude internal tools (orchestration/UI, no side effects)
# -------------------------------------------------------------------

[[allow]]
tool_regex = "^(TaskOutput|TaskCreate|TaskList|TaskGet|TaskUpdate|TaskStop|Skill|SendMessage|TeamCreate|TeamDelete|NotebookEdit)$"

# -------------------------------------------------------------------
# MUST PASSTHROUGH - tools with interactive UI dialogs
# Auto-approving these bypasses Claude Code's user-facing dialogs,
# causing blank answers or skipped consent screens.
# Do NOT add these to any allow rule:
#   - AskUserQuestion  (interactive question dialog; blank if auto-allowed)
#   - EnterPlanMode    (user must consent to entering plan mode)
#   - ExitPlanMode     (user must review and approve the plan)
#   - EnterWorktree    (user must consent to worktree creation)
#   - ExitWorktree     (user must consent to keep/remove worktree)
#   - CronCreate       (user should approve scheduled recurring jobs)
#   - CronDelete       (user should approve canceling scheduled jobs)
#   - CronList         (read-only but kept consistent with Cron tools)
#
# The following four tools are NOT allow-listed (so they default to passthrough)
# but are also filtered out of the passthrough-only audit log by
# `DESIGN_PASSTHROUGH_TOOLS` in `src/auditing.rs`. The skip is audit-log-only;
# the decision is still passthrough for the runtime hook.
#   - ScheduleWakeup    (loop self-pacing schedule; user-initiated)
#   - SendUserFile      (user-facing file delivery; downstream UI handles)
#   - PushNotification  (user-facing notification; downstream UI handles)
#   - LSP               (language-server queries; downstream IDE handles)
# -------------------------------------------------------------------

# -------------------------------------------------------------------
# Playwright MCP browser tools (sandboxed browser interaction)
# -------------------------------------------------------------------

[[allow]]
tool_regex = "^mcp__plugin_playwright_playwright__browser_"
